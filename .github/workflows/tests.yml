name: tests

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json
      - run: npm ci
        working-directory: tests
      - run: npm test
        working-directory: tests
